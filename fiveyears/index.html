    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #1a1209;
            --bg-card: #2a1f10;
            --amber: #d4920a;
            --amber-light: #f0b429;
            --amber-glow: rgba(212, 146, 10, 0.3);
            --cream: #f5e6c8;
            --cream-dim: #b8a88a;
            --brown: #3d2e1a;
            --brown-light: #5a4430;
        }

        body {
            font-family: 'Yuji Syuku', serif;
            background-color: var(--bg-dark);
            color: var(--cream);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Background slideshow */
        .bg-slideshow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .bg-slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 3s ease-in-out;
            filter: sepia(0.5) brightness(0.6) contrast(0.9);
        }

        .bg-slide.active {
            opacity: 0.25;
        }

        /* Retro texture overlay */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(ellipse at center, transparent 0%, var(--bg-dark) 70%),
                repeating-linear-gradient(0deg,
                    transparent,
                    transparent 2px,
                    rgba(0, 0, 0, 0.03) 2px,
                    rgba(0, 0, 0, 0.03) 4px);
            pointer-events: none;
            z-index: 1;
        }

        /* Warm vignette glow */
        body::after {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 50% 40%,
                    rgba(212, 146, 10, 0.08) 0%,
                    transparent 50%);
            pointer-events: none;
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 2rem;
            width: 100%;
            max-width: 700px;
        }

        /* Live schedule ticker */
        .ticker-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 36px;
            background: rgba(26, 18, 9, 0.85);
            border-bottom: 1px solid var(--brown-light);
            z-index: 10;
            overflow: hidden;
            display: flex;
            align-items: center;
        }

        .ticker-label {
            flex-shrink: 0;
            background: var(--amber);
            color: var(--bg-dark);
            font-family: 'Special Elite', cursive;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 0 0.7rem;
            height: 100%;
            display: flex;
            align-items: center;
            letter-spacing: 0.1em;
            white-space: nowrap;
            z-index: 11;
            cursor: pointer;
            position: relative;
            user-select: none;
        }

        /* Schedule popup */
        .schedule-popup {
            display: none;
            position: fixed;
            top: 36px;
            left: 0;
            width: 340px;
            max-width: 90vw;
            max-height: calc(100vh - 50px);
            overflow-y: auto;
            background: rgba(26, 18, 9, 0.97);
            border: 1px solid var(--brown-light);
            border-top: none;
            z-index: 10;
            padding: 0.5rem 0;
            box-shadow: 4px 4px 20px rgba(0, 0, 0, 0.6);
        }

        .schedule-popup.show {
            display: block;
            animation: fadeIn 0.25s ease-out;
        }

        .schedule-popup-item {
            padding: 0.6rem 1rem;
            border-bottom: 1px solid rgba(90, 68, 48, 0.3);
        }

        .schedule-popup-item:last-child {
            border-bottom: none;
        }

        .schedule-popup-item .popup-band {
            font-family: 'Yuji Syuku', serif;
            color: var(--amber);
            font-weight: 700;
            font-size: 0.85rem;
            margin-bottom: 0.2rem;
        }

        .schedule-popup-item .popup-venue {
            font-family: 'Yuji Syuku', serif;
            color: var(--cream);
            font-size: 0.8rem;
        }

        .schedule-popup-item .popup-with {
            font-family: 'Yuji Syuku', serif;
            color: var(--cream-dim);
            font-size: 0.72rem;
            margin-top: 0.1rem;
        }

        .schedule-popup-item .popup-past {
            opacity: 0.4;
        }

        .ticker-track {
            flex: 1;
            overflow: hidden;
            position: relative;
            height: 100%;
        }

        .ticker-content {
            display: flex;
            align-items: center;
            height: 100%;
            position: absolute;
            white-space: nowrap;
            will-change: transform;
            animation: tickerScroll var(--ticker-duration, 60s) linear infinite;
        }

        .ticker-item {
            font-family: 'Yuji Syuku', serif;
            font-size: 0.85rem;
            color: var(--cream);
            padding: 0 2rem;
            white-space: nowrap;
        }

        .ticker-item .venue {
            color: var(--amber-light);
        }

        .ticker-item .band {
            color: var(--amber);
            font-weight: 700;
        }

        .ticker-item .with {
            color: var(--cream-dim);
            font-size: 0.75rem;
        }

        .ticker-sep {
            color: var(--brown-light);
            padding: 0 0.5rem;
            font-size: 0.7rem;
        }

        @keyframes tickerScroll {
            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(-50%);
            }
        }

        /* Language toggle */
        .lang-toggle {
            position: fixed;
            top: 2.8rem;
            right: 1.5rem;
            z-index: 10;
            display: flex;
            gap: 0;
            border: 1px solid var(--brown-light);
            border-radius: 4px;
            overflow: hidden;
        }

        .lang-btn {
            background: var(--brown);
            color: var(--cream-dim);
            border: none;
            padding: 0.4rem 0.8rem;
            font-family: 'Special Elite', cursive;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.05em;
        }

        .lang-btn:hover {
            background: var(--brown-light);
        }

        .lang-btn.active {
            background: var(--amber);
            color: var(--bg-dark);
        }

        /* Artist name */
        .artist-name {
            font-family: 'Yuji Syuku', serif;
            font-size: 3.2rem;
            font-weight: 400;
            color: var(--cream);
            letter-spacing: 0.2em;
            margin-bottom: 0.3rem;
            text-shadow: 0 0 40px var(--amber-glow), 0 2px 8px rgba(0, 0, 0, 0.5);
            animation: fadeInDown 1s ease-out;
        }

        .artist-name-en {
            font-family: 'Special Elite', cursive;
            font-size: 1rem;
            color: var(--cream-dim);
            letter-spacing: 0.3em;
            text-transform: uppercase;
            margin-bottom: 2rem;
            animation: fadeInDown 1s ease-out 0.2s both;
        }

        /* Coming soon label */
        .coming-soon {
            display: inline-block;
            font-family: 'Special Elite', cursive;
            font-size: 1.1rem;
            color: var(--amber);
            letter-spacing: 0.4em;
            text-transform: uppercase;
            border-top: 1px solid var(--brown-light);
            border-bottom: 1px solid var(--brown-light);
            padding: 0.6rem 0;
            margin-bottom: 2.5rem;
            animation: fadeIn 1s ease-out 0.4s both;
        }

        /* Countdown */
        .countdown {
            display: flex;
            justify-content: center;
            gap: 0.8rem;
            margin-bottom: 2.5rem;
            animation: fadeInUp 1s ease-out 0.6s both;
        }

        .countdown-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .countdown-value {
            font-family: 'Special Elite', cursive;
            font-size: 3.2rem;
            font-weight: 700;
            color: var(--cream);
            background: var(--bg-card);
            border: 1px solid var(--brown-light);
            border-radius: 6px;
            padding: 0.5rem 0.8rem;
            min-width: 80px;
            text-align: center;
            box-shadow:
                inset 0 -2px 4px rgba(0, 0, 0, 0.4),
                inset 0 2px 4px rgba(255, 255, 255, 0.03),
                0 4px 12px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        /* Flip card center line */
        .countdown-value::after {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            top: 50%;
            height: 1px;
            background: rgba(0, 0, 0, 0.3);
            box-shadow: 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        .countdown-label {
            font-size: 0.7rem;
            color: var(--cream-dim);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-top: 0.5rem;
            font-family: 'Special Elite', cursive;
        }

        .countdown-separator {
            font-family: 'Special Elite', cursive;
            font-size: 3rem;
            color: var(--amber);
            align-self: flex-start;
            padding-top: 0.6rem;
            animation: blink 1s step-end infinite;
        }

        /* Release date */
        .release-date {
            font-size: 0.9rem;
            color: var(--cream-dim);
            letter-spacing: 0.1em;
            animation: fadeInUp 1s ease-out 0.8s both;
        }

        .release-date span {
            color: var(--amber-light);
        }

        /* Footer */
        footer {
            position: fixed;
            bottom: 1.5rem;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 2;
        }

        footer p {
            font-family: 'Special Elite', cursive;
            font-size: 0.75rem;
            color: var(--brown-light);
            letter-spacing: 0.1em;
        }

        footer .credit {
            margin-top: 0.3rem;
            font-size: 0.65rem;
            color: var(--brown);
            letter-spacing: 0.05em;
        }

        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        /* Responsive */
        @media (max-width: 600px) {
            .artist-name {
                font-size: 2.2rem;
                letter-spacing: 0.12em;
            }

            .artist-name-en {
                font-size: 0.8rem;
            }

            .countdown {
                gap: 0.4rem;
            }

            .countdown-value {
                font-size: 2rem;
                min-width: 55px;
                padding: 0.4rem 0.5rem;
            }

            .countdown-separator {
                font-size: 2rem;
                padding-top: 0.4rem;
            }

            .countdown-label {
                font-size: 0.6rem;
            }

            .coming-soon {
                font-size: 0.9rem;
                letter-spacing: 0.3em;
            }
        }
        /* Count-up mode */
        .countdown-direction-label {
            font-family: 'Special Elite', cursive;
            font-size: 0.85rem;
            color: var(--amber);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-bottom: 0.8rem;
            animation: fadeIn 1s ease-out 0.5s both;
        }

        /* Five-year countdown */
        .fiveyear-countdown {
            margin-top: 2rem;
            animation: fadeInUp 1s ease-out 1.1s both;
        }

        .toumeikan-cta {
            margin-top: 1.5rem;
            animation: fadeIn 0.8s ease-out both;
        }

        .btn-toumeikan {
            display: inline-block;
            font-family: 'Special Elite', cursive;
            font-size: 1rem;
            color: var(--amber);
            background: transparent;
            border: 1px solid var(--amber);
            padding: 0.8rem 2rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            text-decoration: none;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .btn-toumeikan:hover {
            background: var(--amber);
            color: var(--bg-card);
        }
    </style>
</head>

    <script>
        // Target date: April 26, 2026 00:00:00 JST (UTC+9)
        const TARGET_DATE = new Date('2026-04-26T00:00:00+09:00').getTime();
        const FIVE_YEAR_TARGET = new Date('2031-04-26T00:00:00+09:00').getTime();
        const TEST_FIVE_YEAR = new URLSearchParams(location.search).has('test5y');

        let currentLang = 'ja';
        let currentSlide = 0;
        let allSchedule = []; // loaded from schedule.json

        // Pick localized field with JA fallback
        function localized(item, key) {
            if (currentLang === 'en' && item[key + '_en']) return item[key + '_en'];
            return item[key] || '';
        }

        // --- Load Schedule from JSON ---
        async function loadSchedule() {
            try {
                const res = await fetch('/schedule.json?v=2', { cache: 'no-store' });
                allSchedule = await res.json();
            } catch (e) {
                console.warn('Failed to load schedule.json, using empty schedule', e);
                allSchedule = [];
            }
            initTicker(allSchedule);
            buildSchedulePopup(allSchedule);
        }

        // --- Ticker ---
        function initTicker(schedule) {
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            // Filter out past events
            const upcoming = schedule.filter(item => {
                const eventDate = new Date(item.date + 'T23:59:59+09:00');
                return eventDate >= today;
            });

            if (upcoming.length === 0) return;

            const container = document.getElementById('tickerContent');

            // Build items twice for seamless loop
            function buildItems() {
                let html = '';
                upcoming.forEach((item, i) => {
                    const band = localized(item, 'band');
                    const text = localized(item, 'text');
                    const withText = localized(item, 'with');
                    const note = localized(item, 'note');
                    html += '<span class="ticker-item">';
                    html += '<span class="band">' + band + '</span> ';
                    html += '<span class="venue">' + text + '</span>';
                    if (withText) html += ' <span class="with">' + withText + '</span>';
                    if (note) html += ' <span class="with">' + note + '</span>';
                    html += '</span>';
                    if (i < upcoming.length - 1) html += '<span class="ticker-sep">◆</span>';
                });
                return html;
            }

            const itemsHtml = buildItems();
            container.innerHTML = itemsHtml + '<span class="ticker-sep">◆</span>' + itemsHtml + '<span class="ticker-sep">◆</span>';

            // Adjust speed based on content width
            requestAnimationFrame(() => {
                const contentWidth = container.scrollWidth / 2;
                const speed = 60; // pixels per second
                const duration = contentWidth / speed;
                container.style.setProperty('--ticker-duration', duration + 's');
            });
        }

        // --- Schedule Popup ---
        function buildSchedulePopup(schedule) {
            const popup = document.getElementById('schedulePopup');
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            // Filter out past events (same as ticker)
            const upcoming = schedule.filter(item => {
                const eventDate = new Date(item.date + 'T23:59:59+09:00');
                return eventDate >= today;
            });

            let html = '';
            upcoming.forEach(item => {
                const band = localized(item, 'band');
                const text = localized(item, 'text');
                const withText = localized(item, 'with');
                const note = localized(item, 'note');
                html += '<div class="schedule-popup-item">';
                html += '<div class="popup-band">' + band + '</div>';
                html += '<div class="popup-venue">' + text + '</div>';
                if (withText) html += '<div class="popup-with">' + withText + '</div>';
                if (note) html += '<div class="popup-with">' + note + '</div>';
                html += '</div>';
            });
            popup.innerHTML = html;
        }

        // --- Popup: Mobile tap toggle / PC hover ---
        (function () {
            const label = document.getElementById('tickerLabel');
            const popup = document.getElementById('schedulePopup');
            let isTouchDevice = false;

            label.addEventListener('touchstart', function (e) {
                isTouchDevice = true;
                e.preventDefault();
                popup.classList.toggle('show');
            }, { passive: false });

            label.addEventListener('mouseenter', function () {
                if (!isTouchDevice) popup.classList.add('show');
            });

            label.addEventListener('mouseleave', function () {
                if (!isTouchDevice) popup.classList.remove('show');
            });

            popup.addEventListener('mouseenter', function () {
                if (!isTouchDevice) popup.classList.add('show');
            });

            popup.addEventListener('mouseleave', function () {
                if (!isTouchDevice) popup.classList.remove('show');
            });

            // Close popup when tapping outside on mobile
            document.addEventListener('touchstart', function (e) {
                if (!label.contains(e.target) && !popup.contains(e.target)) {
                    popup.classList.remove('show');
                }
            });
        })();

        // --- Count-up since 2026.04.26 ---
        function updateCountdown() {
            const elapsed = Math.max(0, Date.now() - TARGET_DATE);
            const days = Math.floor(elapsed / (1000 * 60 * 60 * 24));
            const hours = Math.floor((elapsed % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((elapsed % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((elapsed % (1000 * 60)) / 1000);

            document.getElementById('days').textContent = String(days).padStart(2, '0');
            document.getElementById('hours').textContent = String(hours).padStart(2, '0');
            document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
            document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');

            const dirLabel = document.getElementById('countdownDirectionLabel');
            if (dirLabel && !dirLabel.textContent) {
                dirLabel.textContent = 'SINCE 2026.04.26';
            }
        }

        // --- 5-year countdown to Toumeikan ---
        let fiveYearReached = false;

        function updateFiveYearCountdown() {
            const diff = TEST_FIVE_YEAR ? 0 : (FIVE_YEAR_TARGET - Date.now());
            const cta = document.getElementById('toumeikanCta');

            if (diff <= 0) {
                document.getElementById('fyDays').textContent = '00';
                document.getElementById('fyHours').textContent = '00';
                document.getElementById('fyMinutes').textContent = '00';
                document.getElementById('fySeconds').textContent = '00';
                if (cta && !fiveYearReached) {
                    cta.hidden = false;
                    fiveYearReached = true;
                }
                return true; // reached
            }

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById('fyDays').textContent = String(days).padStart(2, '0');
            document.getElementById('fyHours').textContent = String(hours).padStart(2, '0');
            document.getElementById('fyMinutes').textContent = String(minutes).padStart(2, '0');
            document.getElementById('fySeconds').textContent = String(seconds).padStart(2, '0');
            return false;
        }

        // --- Language ---
        function setLang(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.lang === lang);
            });
            document.documentElement.lang = lang;
            document.querySelectorAll('[data-ja][data-en]').forEach(el => {
                const text = el.getAttribute('data-' + lang);
                if (text) el.innerHTML = text;
            });
            // Rebuild ticker/popup so schedule text follows the language
            if (allSchedule.length) {
                initTicker(allSchedule);
                buildSchedulePopup(allSchedule);
            }
        }

        // --- Background Slideshow ---
        function initSlideshow() {
            if (typeof BG_IMAGES === 'undefined' || BG_IMAGES.length === 0) return;

            const container = document.getElementById('slideshow');

            // Use image_config.js to filter which images to display
            const indices = (typeof DISPLAY_IMAGE_INDICES !== 'undefined' && Array.isArray(DISPLAY_IMAGE_INDICES))
                ? DISPLAY_IMAGE_INDICES
                : BG_IMAGES.map((_, i) => i); // fallback: show all

            const filteredImages = indices
                .filter(i => i >= 0 && i < BG_IMAGES.length)
                .map(i => BG_IMAGES[i]);

            if (filteredImages.length === 0) return;

            filteredImages.forEach((src, i) => {
                const div = document.createElement('div');
                div.className = 'bg-slide' + (i === 0 ? ' active' : '');
                div.style.backgroundImage = 'url(' + src + ')';
                container.appendChild(div);
            });

            if (filteredImages.length > 1) {
                setInterval(() => {
                    const slides = document.querySelectorAll('.bg-slide');
                    slides[currentSlide].classList.remove('active');
                    currentSlide = (currentSlide + 1) % slides.length;
                    slides[currentSlide].classList.add('active');
                }, 8000);
            }
        }

        // Start
        updateCountdown();
        updateFiveYearCountdown();
        setInterval(() => {
            updateCountdown();
            updateFiveYearCountdown();
        }, 1000);
        initSlideshow();
        loadSchedule();
    </script>
</body>

</html>
